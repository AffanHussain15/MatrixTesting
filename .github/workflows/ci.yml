name: Node.js CI

# ──────────────────────────────────────────────────────────────────────────────
# TRIGGERS
#   push  → main branch ya v*.*.* tag par (e.g. v1.2.3)
#   schedule → raat 2 AM UTC — Node "current" ke saath test
#   workflow_dispatch → manual run; "skip_build" input se build skip ho sakti hai
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'           # semver tag — build job trigger karta hai
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'   # har raat 02:00 UTC par chalega
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Build job skip karein? (true/false)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# ──────────────────────────────────────────────────────────────────────────────
# CONCURRENCY — same branch par naya run aate hi purana cancel ho jata hai
# ──────────────────────────────────────────────────────────────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ============================================================================
  # JOB 1: test
  # Node 16, 18, 20 par PARALLEL chalata hai (matrix strategy)
  # ============================================================================
  test:
    name: Test / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16, 18, 20]
      fail-fast: false        # ek version fail ho to baki versions cancel mat karo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Output file mein save karo, exit code bhi capture karo
      # (taaki artifact upload ke baad fail ho sake, pehle nahin)
      - name: Run tests
        id: run-tests
        shell: bash
        run: |
          mkdir -p test-results
          set +e
          npm test 2>&1 | tee test-results/output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
          set -e

      # Passing test count ek alag file mein save karo (baseline comparison ke liye)
      # NOTE: grep pattern Mocha/Jest ke "X passing" / "X passed" format ke liye hai
      #       apne test runner ke hisaab se adjust karo
      - name: Save passing test count
        shell: bash
        run: |
          COUNT=$(grep -oE '[0-9]+ (passing|passed|tests? passed)' \
                    test-results/output.txt 2>/dev/null \
                  | grep -oE '^[0-9]+' | head -1 || echo 0)
          echo "node_${{ matrix.node-version }}: $COUNT tests passed" \
            > test-results/count.txt

      # Har Node version ka artifact alag naam se upload hota hai
      - name: Upload test results (Node ${{ matrix.node-version }})
        if: always()          # test fail hone par bhi artifact upload ho
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: test-results/
          retention-days: 14

      # Artifact upload ke baad real exit code propagate karo
      - name: Propagate test failure
        if: steps.run-tests.outputs.exit_code != '0'
        run: exit 1

  # ============================================================================
  # JOB 2: nightly-test
  # Sirf scheduled cron trigger par chalega — Node "current" ke saath
  # ============================================================================
  nightly-test:
    name: Nightly Test / Node current
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js current (latest release)
        uses: actions/setup-node@v4
        with:
          node-version: current
          cache: npm

      - run: npm ci

      - name: Run tests against Node current
        run: npm test

  # ============================================================================
  # JOB 3: summarize
  # Saare matrix artifacts download karta hai, output concatenate karta hai,
  # aur passing count baseline se compare karta hai — girne par FAIL karta hai
  # ============================================================================
  summarize:
    name: Summarize and Validate Tests
    runs-on: ubuntu-latest
    needs: [test]
    if: always()              # test fail hone par bhi summary banao

    steps:
      # Teeno versions ke test-results artifacts download karo
      - name: Download all matrix test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-node-*   # teen artifacts match honge
          path: all-results/             # har artifact apne subfolder mein jaega

      # Saare output.txt files concatenate karo aur GitHub job summary mein likho
      - name: Concatenate results and write job summary
        id: concat
        shell: bash
        run: |
          echo "## Test Results — All Matrix Versions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TOTAL=0

          for dir in all-results/test-results-node-*/; do
            VER=$(basename "$dir" | sed 's/test-results-node-/Node /')
            echo "### $VER" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            if [ -f "$dir/output.txt" ]; then
              cat "$dir/output.txt" >> $GITHUB_STEP_SUMMARY
              COUNT=$(grep -oE '[0-9]+ (passing|passed|tests? passed)' \
                        "$dir/output.txt" 2>/dev/null \
                      | grep -oE '^[0-9]+' | head -1 || echo 0)
              TOTAL=$((TOTAL + COUNT))
            else
              echo "(koi output capture nahin hua)" >> $GITHUB_STEP_SUMMARY
            fi
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done

          echo "**Total passing tests (saare versions): $TOTAL**" \
            >> $GITHUB_STEP_SUMMARY
          # Agla step is value ko use karega
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      # Is branch ka pichla saved baseline cache se restore karo
      - name: Restore baseline count from cache
        uses: actions/cache/restore@v4
        id: restore-baseline
        with:
          path: baseline.txt
          # Unique key ensure karta hai ki retry par same run khud se match na kare
          key: test-baseline-${{ github.ref_name }}-${{ github.run_number }}
          restore-keys: |
            test-baseline-${{ github.ref_name }}-
            test-baseline-main-

      # Agar current count baseline se gir gaya to workflow FAIL karo
      - name: Enforce minimum passing test count
        shell: bash
        env:
          CURRENT: ${{ steps.concat.outputs.total }}
        run: |
          if [ -f baseline.txt ]; then
            PREV=$(cat baseline.txt)
            echo "Purana count: $PREV  |  Naya count: $CURRENT"
            if [ "$CURRENT" -lt "$PREV" ]; then
              echo "::error::Test count GIRA: $PREV se $CURRENT ho gaya! Regression check karo."
              exit 1
            fi
            echo "Count OK ($CURRENT >= $PREV) — sab theek hai."
          else
            echo "Koi baseline nahin mila — is run se baseline set ho raha hai: $CURRENT"
          fi
          # Updated baseline file mein save karo
          echo "$CURRENT" > baseline.txt

      # Agla run is baseline ko use karega
      - name: Save updated baseline to cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: baseline.txt
          key: test-baseline-${{ github.ref_name }}-${{ github.run_number }}

      # Traceability ke liye artifact bhi upload karo
      - name: Upload baseline as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: test-count-baseline
          path: baseline.txt
          retention-days: 90

  # ============================================================================
  # JOB 4: build
  # Tab HI chalega jab teeno matrix test jobs pass ho jayein (needs: [test])
  # Sirf main branch push YA version tag par — PRs aur schedule par nahin
  # Manual approval "production" environment se enforce hoti hai
  # ============================================================================
  build:
    name: Build and Upload Artifact
    runs-on: ubuntu-latest
    needs: [test]             # teeno matrix instances complete hone ka wait karta hai

    # Condition: sirf main push ya semver tag — aur skip_build true nahin hona chahiye
    if: |
      (
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/v')
      ) &&
      github.event.inputs.skip_build != 'true'

    # ── Manual Approval Gate ───────────────────────────────────────────────
    # Repo Settings > Environments > "production" banao aur
    # "Required Reviewers" add karo. Job yahan ruk jaegi jab tak
    # approver "Review deployments > Approve" nahin karta.
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18 (stable LTS for builds)
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # dist/ folder upload karo — artifact name mein branch/tag ka naam bhi hai
      - name: Upload build artifact (dist/)
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/
          retention-days: 90
